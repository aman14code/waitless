version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: waitless-postgres
    environment:
      POSTGRES_USER: waitless
      POSTGRES_PASSWORD: waitless123
      POSTGRES_DB: waitless_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: waitless-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data:
