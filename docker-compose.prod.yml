version: '3.8'

services:
  # PostgreSQL Production
  postgres:
    image: postgres:15
    container_name: waitless-postgres-prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - waitless-network

  # Redis Production
  redis:
    image: redis:7-alpine
    container_name: waitless-redis-prod
    command: redis-server --appendonly yes
    volumes:
      - redis_data_prod:/data
    restart: unless-stopped
    networks:
      - waitless-network

  # Backend Production
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: waitless-backend-prod
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      CLIENT_URL: ${CLIENT_URL}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - waitless-network

  # Frontend Production
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: waitless-frontend-prod
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - waitless-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: waitless-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - waitless-network

volumes:
  postgres_data_prod:
  redis_data_prod:

networks:
  waitless-network:
    driver: bridge
